<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title>SoloDark for ShadowDark RPG</title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="Styles/icrpg fonts.css">
        <link rel="stylesheet" href="Styles/style.css">
        <script type="text/javascript" src="Generators/SD-SoloDark.js"></script>
    </head>
    <body>
        <div id="wrapper">
            <h1>SoloDark for ShadowDark RPG</h1>
            <nav>
                <a href="index.html">Home</a> > <a href="#">SoloDark for ShadowDark RPG</a>
            </nav>
            <div>
                <h2>Dungeon Name</h2>
                <p>
                    <input type="button" value="Generate!" onclick="DungeonName();">
                    <input type="button" value="Clear" onclick="document.getElementById('dungeonName').innerHTML='Generate adventure!'">
                    <ul>
                        <li id="dungeonName">Generate adventure!</li>
                    </ul>
                </p>
            </div>
            <hr>
            <div>
                <h2>Oracle</h2>
                <p>
                    <b>Odds:</b>
                    <input type="button" value="Unlikely or Impossible" onclick="document.getElementById('oddsValue').value='1';document.getElementById('oddsText').innerHTML='Unlikely or Impossible';">
                    <input type="button" value="Even" onclick="document.getElementById('oddsValue').value='2';document.getElementById('oddsText').innerHTML='Even';">
                    <input type="button" value="Likely or Certain" onclick="document.getElementById('oddsValue').value='3';document.getElementById('oddsText').innerHTML='Likely or Certain';">
                    <input type="number" value="2" id="oddsValue" style="display:none;">
                </p>
                <p>
                    <input type="button" value="Roll!" onclick="OracleAnswer(document.getElementById('oddsValue').value);">
                    <input type="button" value="Clear" onclick="document.getElementById('oddsText').innerHTML='Even';document.getElementById('oracleAnswer').innerHTML='Roll Answer!';">
                    <ul>
                        <li id="oddsText">Even</li>
                        <li id="oracleAnswer">Roll Answer!</li>
                    </ul>
                </p>
                <p>
                    <b>Prompt?</b>
                    <input type="button" value="Roll!" onclick="promptGen();">
                    <input type="button" value="Clear" onclick="document.getElementById('promptText').innerHTML='Generate prompt!';">
                    <ul>
                        <li id="promptText">Generate prompt!</li>
                    </ul>
                </p>
            </div>
            <hr>
            <footer>
                Created by Albert. 2026.
            </footer>
        </div>
    </body>
</html>
